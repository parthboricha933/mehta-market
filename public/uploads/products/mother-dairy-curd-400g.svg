<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur stdDeviation="4"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#overlay)"/>

  <circle cx="500" cy="100" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="80" cy="520" r="120" fill="rgba(255,255,255,0.06)"/>

  <text x="300" y="280" font-size="180" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">🥛</text>

  <rect x="40" y="40" width="184" height="44" rx="22" fill="rgba(255,255,255,0.95)"/>
  <text x="132" y="68" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e40af" text-anchor="middle">MOTHER DAIRY</text>

  <rect x="0" y="430" width="600" height="170" fill="rgba(0,0,0,0.4)"/>
  <text x="300" y="475" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Mother Dairy Curd 400g</text>

  <rect x="240" y="510" width="120" height="36" rx="18" fill="rgba(255,255,255,0.25)"/>
  <text x="300" y="534" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">400 g</text>

  <text x="300" y="575" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Mehta Super Market • Rajula</text>
</svg>